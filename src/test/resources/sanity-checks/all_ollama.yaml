id: all_ollama
namespace: sanitychecks.plugin-ollama

inputs:
  - id: prompt
    type: STRING
    defaults: Tell me a joke about AI

tasks:
  - id: ask_ai
    type: io.kestra.plugin.ollama.cli.OllamaCLI
    enableModelCaching: true
    modelCachePath: /Users/kestra/.ollama
    outputFiles:
      - completion.txt
    commands:
      - ollama run smollm:135m "{{ inputs.prompt }}" > completion.txt

  - id: check-output
    type: io.kestra.plugin.core.execution.Assert
    conditions:
      - "{{ outputs.ask_ai.exitCode == 0 }}"
